<!-- add_child_investment.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Child Investment</title>
</head>
<body>
    <h1>Add Child Investment</h1>
    <form method="post">
        {% csrf_token %}
        <label for="parent">Select Parent Investment:</label>
        <select name="parent" id="parent">
            {% for investment in investments %}
                <option value="{{ investment.id }}">{{ investment.name }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="name">Child Investment Name:</label>
        <input type="text" id="name" name="name">
        <button type="submit">Add Child Investment</button>
    </form>
</body>
</html>
